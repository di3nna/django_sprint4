{% extends "base.html" %}
{% block content %}
  <div class="col d-flex justify-content-center">
    <div class="card" style="width: 40rem;">
      <div class="card-header">
        Удаление комментария
      </div>
      <div class="card-body">
        <p>Вы уверены, что хотите удалить этот комментарий?</p>
        <p class="text-muted">{{ comment.text|truncatechars:100 }}</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Удалить</button>
          <a href="{% url 'blog:post_detail' comment.post.pk %}" class="btn btn-secondary">Отмена</a>
        </form>
      </div>
    </div>
  </div>
{% endblock %}
